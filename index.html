<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RNA Synthesia | DNA Helix Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base: #020205;
    --bg-surface: rgba(10, 15, 25, 0.8);
    --primary: #00f0ff;
    --secondary: #7000ff;
    --mutation: #ff0055;
    --text-main: #f0f4f8;
    --text-muted: #8b9bb4;
    --base-G: #10b981; --base-U: #f59e0b; --base-A: #ef4444; --base-C: #3b82f6;
    --radius-lg: 16px; --transition: all 0.3s ease;
  }

  body {
    font-family: 'Outfit', sans-serif; background-color: var(--bg-base); color: var(--text-main);
    margin: 0; overflow-x: hidden;
  }

  .app-container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; display: grid; grid-template-columns: 320px 1fr; gap: 1.5rem; height: 100vh; }
  .panel { background: var(--bg-surface); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: var(--radius-lg); padding: 1.2rem; display: flex; flex-direction: column; overflow: hidden; }

  /* DNA HELIX VISUALIZER */
  #dna-canvas { width: 100%; height: 250px; background: radial-gradient(circle, #0a0a15 0%, #020205 100%); border-radius: 10px; margin-bottom: 1rem; border: 1px solid rgba(0, 240, 255, 0.2); }

  h1 { font-size: 1.5rem; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem; text-align: center; }
  h2 { font-size: 0.8rem; text-transform: uppercase; color: var(--primary); margin: 1rem 0 0.5rem; letter-spacing: 1px; }

  .control-group { margin-bottom: 0.8rem; }
  label { display: block; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 0.3rem; }
  select, input[type="range"] { width: 100%; background: rgba(0,0,0,0.4); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 0.4rem; border-radius: 5px; font-size: 0.8rem; }

  #rna-input { width: 100%; height: 80px; background: #000; color: var(--primary); font-family: 'Fira Code'; padding: 0.8rem; border-radius: 8px; border: 1px solid var(--secondary); font-size: 0.9rem; resize: none; }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 1rem; }
  .stat-card { background: rgba(255,255,255,0.03); padding: 0.6rem; border-radius: 8px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
  .stat-val { font-family: 'Fira Code'; font-weight: bold; color: var(--primary); font-size: 1.1rem; }

  .aa-grid { display: flex; gap: 0.5rem; overflow-x: auto; padding-bottom: 10px; }
  .aa-card { min-width: 80px; padding: 0.6rem; background: rgba(0,0,0,0.5); border-radius: 6px; border-bottom: 3px solid transparent; font-size: 0.75rem; text-align: center; transition: 0.3s; }
  .aa-card.active { background: var(--primary); color: #000; transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0, 240, 255, 0.4); }

  .btn { width: 100%; padding: 0.7rem; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 0.5rem; transition: 0.2s; font-size: 0.8rem; }
  .btn-play { background: var(--primary); color: #000; box-shadow: 0 0 15px rgba(0, 240, 255, 0.3); }
  .btn-mut { background: transparent; border: 1px solid var(--mutation); color: var(--mutation); }
  .btn-mut:hover { background: var(--mutation); color: #000; }

  ::-webkit-scrollbar { height: 4px; width: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--secondary); border-radius: 10px; }
</style>
</head>
<body>

<div class="app-container">
  <aside class="panel">
    <h1>🧬 BIO-TRON</h1>
    
    <canvas id="dna-canvas"></canvas>

    <div class="control-group">
      <label>Proteína Base</label>
      <select id="preset-select">
        <option value="oxytocin">Oxitocina</option>
        <option value="insulin">Insulina</option>
        <option value="gfp">GFP (Fluorescente)</option>
      </select>
    </div>

    <h2>⚙️ Configuración Alfa</h2>
    <div class="control-group">
      <label>Velocidad de Giro (Hélice)</label>
      <input type="range" id="param-rotation" min="1" max="10" value="3">
    </div>
    <div class="control-group">
      <label>Densidad de Codones (BPM)</label>
      <input type="range" id="bpm" min="40" max="220" value="100">
    </div>

    <button id="btn-play" class="btn btn-play">INICIAR SECUENCIACIÓN</button>
    <button id="btn-stop" class="btn" style="background:#222; color:#888;">STOP</button>
    <button id="btn-mutate" class="btn btn-mut">RADIACIÓN ALFA</button>
  </aside>

  <main class="panel">
    <div class="stats-grid">
      <div class="stat-card"><div>Estabilidad GC</div><div id="stat-gc" class="stat-val">0%</div></div>
      <div class="stat-card"><div>Masa Molecular</div><div id="stat-weight" class="stat-val">0 Da</div></div>
    </div>

    <textarea id="rna-input" spellcheck="false"></textarea>
    
    <h2>🧬 Traducción en Tiempo Real</h2>
    <div id="aa-container" class="aa-grid"></div>

    <div id="stat-status" style="margin-top:auto; font-size:0.7rem; color:var(--text-muted); border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;">
      SISTEMA LISTO: Introduce secuencia ARN para comenzar.
    </div>
  </main>
</div>

<script>
// --- MOTOR DE DATOS ---
const AMINO_ACIDS = {
  'Ala': { type: 'nonpolar', weight: 89 }, 'Val': { type: 'nonpolar', weight: 117 },
  'Ser': { type: 'polar', weight: 105 }, 'Arg': { type: 'basic', weight: 174 },
  'Asp': { type: 'acidic', weight: 133 }, 'Stop': { type: 'stop', weight: 0 },
  'Met': { type: 'nonpolar', weight: 149 }
};
const CODON_TABLE = { 
    AUG: 'Met', GCU: 'Ala', GCC: 'Ala', GCA: 'Ala', GCG: 'Ala',
    GUU: 'Val', GUC: 'Val', GUA: 'Val', GUG: 'Val',
    UCU: 'Ser', UCC: 'Ser', UCA: 'Ser', UCG: 'Ser',
    CGU: 'Arg', CGC: 'Arg', CGA: 'Arg', CGG: 'Arg',
    GAU: 'Asp', GAC: 'Asp', UAA: 'Stop', UAG: 'Stop', UGA: 'Stop'
};
const PRESETS = {
  oxytocin: "AUGUGCUACCUGCAGAAUUGCCCCCGGGGAUAG",
  insulin: "AUGGCCCUGUGGAUGCGCCUCCUGCCCCUGCUGGCGCUGCUGGCCCUCUGGGGACCUGACCCAGCCGCAGCCUUU",
  gfp: "AUGAGUAAAGGAGAAGAACUUUUCACUGGAGUUGUCCCAAUUCUUGUUGAUUUAGGACAAACUGCUAGAGCUGGA"
};
const BASE_COLORS = { A: '#ef4444', U: '#f59e0b', G: '#10b981', C: '#3b82f6' };

// --- VARIABLES GLOBALES ---
let audioCtx, masterGain, isPlaying = false, currentIdx = 0, timer;
let rotationAngle = 0;

// --- VISUALIZADOR DE HÉLICE 3D ---
const canvas = document.getElementById('dna-canvas');
const ctx = canvas.getContext('2d');

function drawDNA() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const speed = document.getElementById('param-rotation').value / 100;
  rotationAngle += isPlaying ? speed * 2 : speed;

  const centerY = canvas.height / 2;
  const centerX = canvas.width / 2;
  const amplitude = 60;
  const spacing = 15;

  for (let i = 0; i < 15; i++) {
    const x = (i * spacing) + (centerX - 100);
    const angle = rotationAngle + (i * 0.5);
    
    const y1 = centerY + Math.sin(angle) * amplitude;
    const y2 = centerY + Math.sin(angle + Math.PI) * amplitude;

    // Dibujar unión (peldaño)
    ctx.beginPath();
    ctx.moveTo(x, y1);
    ctx.lineTo(x, y2);
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.stroke();

    // Dibujar Nucleótidos (bolas)
    drawNode(x, y1, angle, i);
    drawNode(x, y2, angle + Math.PI, i + 100);
  }
  requestAnimationFrame(drawDNA);
}

function drawNode(x, y, angle, id) {
  const size = 4 + Math.cos(angle) * 2;
  ctx.beginPath();
  ctx.arc(x, y, size, 0, Math.PI * 2);
  // Si está sonando, brilla en cian, si no, en gris azulado
  ctx.fillStyle = isPlaying && Math.abs(x - 150) < 20 ? '#00f0ff' : '#334466';
  ctx.shadowBlur = isPlaying ? 10 : 0;
  ctx.shadowColor = '#00f0ff';
  ctx.fill();
  ctx.shadowBlur = 0;
}

// --- AUDIO ---
function playBioTone(freq, duration) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  g.gain.setValueAtTime(0.1, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
  osc.connect(g).connect(masterGain);
  osc.start(); osc.stop(audioCtx.currentTime + duration);
}

function processStep() {
  const seq = document.getElementById('rna-input').value.toUpperCase().replace(/[^GACU]/g, '');
  const codons = [];
  for(let i=0; i<seq.length-2; i+=3) {
    const tri = seq.substring(i, i+3);
    const aa = CODON_TABLE[tri] || 'Ala';
    codons.push({ tri, ...AMINO_ACIDS[aa], name: aa });
  }

  if (currentIdx >= codons.length || !isPlaying) { stop(); return; }

  const c = codons[currentIdx];
  const bpm = document.getElementById('bpm').value;
  
  // Sonido basado en la primera base del codón
  const freqs = { A: 440, U: 330, G: 392, C: 261 };
  playBioTone(freqs[c.tri[0]] || 220, 0.4);

  // Update UI
  updateStats(codons, currentIdx);
  currentIdx++;
  timer = setTimeout(processStep, 60000 / bpm);
}

function updateStats(codons, idx) {
  const container = document.getElementById('aa-container');
  container.innerHTML = codons.map((c, i) => `
    <div class="aa-card ${i===idx?'active':''}" style="border-color:${BASE_COLORS[c.tri[0]]}">
      <strong>${c.tri}</strong><br>${c.name}
    </div>
  `).join('');
  
  const gc = (codons.map(c=>c.tri).join('').match(/[GC]/g) || []).length;
  document.getElementById('stat-gc').textContent = Math.round((gc/(codons.length*3))*100) + '%';
  document.getElementById('stat-weight').textContent = codons.reduce((a,b)=>a+b.weight, 0) + " Da";
  
  if(container.querySelectorAll('.aa-card')[idx]) 
    container.querySelectorAll('.aa-card')[idx].scrollIntoView({ behavior: 'smooth', inline: 'center' });
}

function stop() { isPlaying = false; currentIdx = 0; clearTimeout(timer); }

document.getElementById('btn-play').onclick = () => {
  if (!audioCtx) {
    audioCtx = new AudioContext();
    masterGain = audioCtx.createGain();
    masterGain.connect(audioCtx.destination);
  }
  if(!isPlaying){ isPlaying = true; processStep(); }
};
document.getElementById('btn-stop').onclick = stop;
document.getElementById('preset-select').onchange = (e) => {
  document.getElementById('rna-input').value = PRESETS[e.target.value];
  stop();
};
document.getElementById('btn-mutate').onclick = () => {
  let s = document.getElementById('rna-input').value.split('');
  s[Math.floor(Math.random()*s.length)] = ['A','U','G','C'][Math.floor(Math.random()*4)];
  document.getElementById('rna-input').value = s.join('');
};

// Inicio
document.getElementById('rna-input').value = PRESETS.oxytocin;
drawDNA();
</script>
</body>
</html>
